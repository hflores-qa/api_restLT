name: API Tests + Allure Report

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Run tests
        run: mvn clean test

      - name: Verify results
        run: ls -R target/allure-results || true

      - name: Validate Allure Results
        run: |
          if [ ! -d "target/allure-results" ] || [ -z "$(ls -A target/allure-results)" ]; then
            echo "❌ No hay resultados de Allure"
            exit 1
          fi

      - name: Generate report
        run: |
          rm -rf target/allure-report
          allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report