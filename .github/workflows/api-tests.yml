name: API Tests + Allure Report

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      # 4. Instalar Allure CLI (correcto)
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 5. Ejecutar tests
      - name: Run tests
        run: mvn clean test -Denv=qa

      # 6. Debug (opcional pero útil)
      - name: Verify Allure Results (debug)
        run: ls -R target/allure-results || true

      # 7. Validación REAL (fail-fast)
      - name: Validate Allure Results
        run: |
          if [ ! -d "target/allure-results" ] || [ -z "$(ls -A target/allure-results)" ]; then
            echo "❌ No hay resultados de Allure. Revisa ejecución de tests."
            exit 1
          fi

      # 8. Generar reporte limpio
      - name: Generate Allure Report
        run: |
          rm -rf target/allure-report
          allure generate target/allure-results --clean -o target/allure-report

      # 9. Validar que el reporte tenga data (evita "Loading...")
      - name: Validate Allure Report Content
        run: |
          if [ ! -d "target/allure-report/data" ] || [ -z "$(ls -A target/allure-report/data)" ]; then
            echo "❌ El reporte Allure no contiene data válida"
            exit 1
          fi

      # 10. Subir artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report