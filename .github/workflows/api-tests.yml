name: API Tests + Allure Report

on:
  push:
    branches:
      - master
      - main

# Permiso necesario para artifacts y gh-pages
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java setup
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn clean test -Denv=qa

      # Debug results (CLAVE)
      - name: Verify Allure Results
        run: ls -R target/allure-results || true

      # 5. Instalar Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline@latest

      # 6. Generar reporte Allure (ESTÁTICO)
      - name: Generate Allure Report
        run: |
          rm -rf target/allure-report
          allure generate target/allure-results --clean -o target/allure-report

      # Debug report (CLAVE)
      - name: Verify Allure Report
        run: ls -R target/allure-report || true

      # 7. Subir artifact descargable
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      # 8. Deploy opcional a GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report