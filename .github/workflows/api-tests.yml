name: API Tests + Allure Report

on:
  push:
    branches:
      - master
      - main

# CLAVE: permisos para poder hacer push a gh-pages
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn clean test -Denv=qa

      # DEBUG: verificar que sí existan results
      - name: Debug Allure Results
        run: ls -la target/allure-results || true

      # 5. Instalar Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 6. Generar reporte Allure
      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o target/allure-report

      # DEBUG: verificar reporte
      - name: Debug Allure Report
        run: ls -la target/allure-report || true

      # 7. Subir artifact (descarga ZIP opcional)
      - name: Upload Allure Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      # 8. Deploy a GitHub Pages
      - name: Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report