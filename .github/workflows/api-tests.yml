name: API Tests + Allure Report

on:
  push:
    branches:
      - master
      - main

# Permiso necesario para deploy y artifacts
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven (optimiza CI)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      # 4. Ejecutar tests
      - name: Run tests
        run: mvn clean test -Denv=qa

      # Debug: verificar results
      - name: Debug Allure Results
        run: ls -R target/allure-results || true

      # 5. Instalar Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 6. Generar reporte Allure (ESTÁTICO)
      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o target/allure-report

      # Debug report
      - name: Debug Allure Report
        run: ls -R target/allure-report || true

      # 7. Subir artifact (ZIP descargable)
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      # 8. (OPCIONAL) Deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report